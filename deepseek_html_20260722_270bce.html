<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铷原子g_F因子 · 数据处理软件</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f4f9;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 24px 16px;
            color: #0b1e2e;
        }
        .container {
            max-width: 1260px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 20px 50px rgba(0, 20, 40, 0.08);
            padding: 30px 28px 38px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0a2942;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 sub {
            font-size: 0.9rem;
            font-weight: 400;
            color: #256185;
        }
        .subhead {
            color: #256185;
            border-left: 4px solid #2d7fc1;
            padding-left: 18px;
            background: #ecf5fd;
            border-radius: 0 30px 30px 0;
            padding: 8px 18px;
            font-size: 0.92rem;
            margin-bottom: 24px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 20px;
            background: #f7faff;
            border-radius: 28px;
            padding: 20px 24px;
            border: 1px solid #e2ecf6;
            margin-bottom: 28px;
            align-items: flex-end;
        }
        .toolbar .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1 1 140px;
            min-width: 120px;
        }
        .toolbar .field label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #3a688a;
        }
        .toolbar .field input {
            padding: 8px 12px;
            border: 1.5px solid #d5e0ec;
            border-radius: 14px;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            background: white;
            transition: 0.15s;
            outline: none;
            width: 100%;
        }
        .toolbar .field input:focus {
            border-color: #1f7bc4;
            box-shadow: 0 0 0 3px rgba(31, 123, 196, 0.12);
        }
        .toolbar .field input.small-input {
            width: 80px;
            flex: 0 0 80px;
        }
        .toolbar .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #c8d8ea;
            background: white;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1d3d5e;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fafcff;
        }
        .btn-primary {
            background: #1d4e7c;
            border-color: #1d4e7c;
            color: white;
            box-shadow: 0 4px 12px rgba(26, 80, 140, 0.15);
        }
        .btn-primary:hover {
            background: #123b60;
            transform: scale(0.97);
        }
        .btn-success {
            background: #1d7c5e;
            border-color: #1d7c5e;
            color: white;
        }
        .btn-success:hover {
            background: #14644b;
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #b8cde0;
        }
        .btn-outline:hover {
            background: #e8f0fa;
            border-color: #8aadcc;
        }
        .btn-danger-outline {
            background: transparent;
            border: 1.5px solid #e0b3b3;
            color: #a04141;
        }
        .btn-danger-outline:hover {
            background: #fce8e8;
            border-color: #c0392b;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 24px;
            margin-top: 6px;
        }
        @media (max-width: 820px) {
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar .field {
                flex: 1 1 auto;
            }
            .toolbar .actions {
                justify-content: center;
                margin-top: 6px;
            }
        }
        .chart-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 16px 18px;
            border: 1px solid #e5edf6;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
        }
        .chart-card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #1b3e5e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 270px;
        }
        .chart-wrapper.bar-chart {
            height: 290px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 14px;
            background: #f8fbfe;
            border-radius: 20px;
            padding: 14px 18px;
            border: 1px solid #e2ecf6;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        .stat-item .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #4c6e8a;
            font-weight: 600;
        }
        .stat-item .value {
            font-weight: 600;
            font-size: 0.95rem;
            color: #0b2a44;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 1px;
        }
        .stat-item .value small {
            font-weight: 400;
            font-size: 0.7rem;
            color: #3f6a8a;
            margin-left: 4px;
        }
        .data-table {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            background: #f8fbfe;
            border-radius: 18px;
            padding: 12px 18px;
            margin-top: 10px;
            border: 1px solid #e2ecf6;
            font-size: 0.82rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .data-table .row {
            display: flex;
            gap: 8px 18px;
            flex-wrap: wrap;
        }
        .data-table .row .tag {
            color: #3a688a;
        }
        .data-table .row .num {
            color: #0b2a44;
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            background: #dce9f5;
            color: #1f4a6e;
            padding: 0 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .footer-note {
            margin-top: 28px;
            color: #4b6e89;
            font-size: 0.78rem;
            border-top: 1px solid #e2ecf6;
            padding-top: 20px;
            text-align: center;
        }
        .inline-code {
            background: #eaf1f9;
            padding: 1px 8px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #1f4a6e;
        }
        .preset-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 4px;
        }
        .preset-btn {
            font-size: 0.7rem;
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid #c8d8ea;
            background: white;
            cursor: pointer;
            color: #1d3d5e;
            transition: 0.1s;
        }
        .preset-btn:hover {
            background: #e8f0fa;
            border-color: #8aadcc;
        }
        @media (max-width: 480px) {
            .container {
                padding: 16px 12px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🧪 铷原子 g<sub>F</sub> · 数据处理 <sub>交互式分析</sub></h1>
            <span class="badge" style="font-size:0.75rem; padding:4px 16px;">v1.0 · 实时绘图</span>
        </div>
        <div class="subhead">
            ⚡ 输入测量数据 · 自动计算相对误差 &amp; 总扩展不确定度 · 双图联动
        </div>

        <!-- 工具栏 -->
        <div class="toolbar" id="toolbar">
            <div class="field">
                <label>Rb₈₅ 数据 (5个)</label>
                <input type="text" id="data85" value="0.331111, 0.330705, 0.331258, 0.331074, 0.330521" placeholder="用逗号分隔">
            </div>
            <div class="field">
                <label>Rb₈₇ 数据 (5个)</label>
                <input type="text" id="data87" value="0.496426, 0.495504, 0.496795, 0.496057, 0.495873" placeholder="用逗号分隔">
            </div>
            <div class="field" style="flex:0 0 100px;">
                <label>标准值 Rb₈₅</label>
                <input type="text" id="std85" value="0.333333333333333" class="small-input" style="width:100%;">
            </div>
            <div class="field" style="flex:0 0 100px;">
                <label>标准值 Rb₈₇</label>
                <input type="text" id="std87" value="0.5" class="small-input" style="width:100%;">
            </div>
            <div class="field" style="flex:0 0 100px;">
                <label>U₈₅</label>
                <input type="text" id="u85" value="0.012700477" class="small-input" style="width:100%;">
            </div>
            <div class="field" style="flex:0 0 100px;">
                <label>U₈₇</label>
                <input type="text" id="u87" value="0.01270125" class="small-input" style="width:100%;">
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="updateBtn">🔄 更新图表</button>
                <button class="btn btn-success" id="downloadBtn">⬇️ 下载截图</button>
                <button class="btn btn-outline" id="resetBtn">↺ 重置</button>
            </div>
        </div>

        <!-- 预设快速加载 -->
        <div style="display:flex; flex-wrap:wrap; gap:6px 12px; margin-bottom:18px; align-items:center;">
            <span style="font-size:0.75rem; color:#3a688a; font-weight:500;">预设样例：</span>
            <button class="preset-btn" data-preset="default">默认</button>
            <button class="preset-btn" data-preset="sample1">样本1 (偏差大)</button>
            <button class="preset-btn" data-preset="sample2">样本2 (高精度)</button>
            <span style="font-size:0.7rem; color:#5a7b9a; margin-left:4px;">点击加载数据</span>
        </div>

        <!-- 图表网格 -->
        <div class="grid-2">
            <div class="chart-card">
                <h2>📈 相对误差 E<sub>r</sub> (%) · 5次测量</h2>
                <div class="chart-wrapper">
                    <canvas id="lineChart"></canvas>
                </div>
                <div class="data-table" id="errTable">
                    <div class="row"><span class="tag">Rb₈₅</span><span class="num" id="err85_display">—</span></div>
                    <div class="row"><span class="tag">Rb₈₇</span><span class="num" id="err87_display">—</span></div>
                </div>
            </div>

            <div class="chart-card">
                <h2>📊 g<sub>F</sub> 平均值 ± 总扩展不确定度</h2>
                <div class="chart-wrapper bar-chart">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-item">
                        <span class="label">Rb₈₅ g<sub>F</sub></span>
                        <span class="value" id="mean85_display">—</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Rb₈₇ g<sub>F</sub></span>
                        <span class="value" id="mean87_display">—</span>
                    </div>
                    <div class="stat-item" style="grid-column: span 2;">
                        <span class="label">理论标准值</span>
                        <span style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;" id="stdDisplay">Rb₈₅ = 0.3333  |  Rb₈₇ = 0.5</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-note">
            ⚡ 数据实时计算 · 点击「更新图表」刷新 · 下载为 PNG
        </div>
    </div>

    <script>
        (function() {
            // ---- DOM refs ----
            const data85Input = document.getElementById('data85');
            const data87Input = document.getElementById('data87');
            const std85Input = document.getElementById('std85');
            const std87Input = document.getElementById('std87');
            const u85Input = document.getElementById('u85');
            const u87Input = document.getElementById('u87');
            const updateBtn = document.getElementById('updateBtn');
            const resetBtn = document.getElementById('resetBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            const err85Display = document.getElementById('err85_display');
            const err87Display = document.getElementById('err87_display');
            const mean85Display = document.getElementById('mean85_display');
            const mean87Display = document.getElementById('mean87_display');
            const stdDisplay = document.getElementById('stdDisplay');

            // ---- Chart instances ----
            let lineChart = null;
            let barChart = null;

            // ---- 解析数据 ----
            function parseData(str) {
                return str.split(',').map(s => parseFloat(s.trim())).filter(v => !isNaN(v));
            }

            // ---- 核心更新 ----
            function updateCharts() {
                const raw85 = parseData(data85Input.value);
                const raw87 = parseData(data87Input.value);
                const std85 = parseFloat(std85Input.value) || 0.333333333333333;
                const std87 = parseFloat(std87Input.value) || 0.5;
                const U85 = parseFloat(u85Input.value) || 0.012700477;
                const U87 = parseFloat(u87Input.value) || 0.01270125;

                // 如果数据不足，补齐或提示
                if (raw85.length < 2 || raw87.length < 2) {
                    alert('请至少输入2个数据点');
                    return;
                }

                // 取前5个（或补齐）
                const gf85 = raw85.slice(0, 5);
                const gf87 = raw87.slice(0, 5);
                while (gf85.length < 5) gf85.push(gf85[gf85.length - 1] || 0);
                while (gf87.length < 5) gf87.push(gf87[gf87.length - 1] || 0);

                const n = [1, 2, 3, 4, 5];

                // 相对误差
                const err85 = gf85.map(v => (1 - v / std85) * 100);
                const err87 = gf87.map(v => (1 - v / std87) * 100);

                // 平均值
                const mean85 = gf85.reduce((a, b) => a + b, 0) / gf85.length;
                const mean87 = gf87.reduce((a, b) => a + b, 0) / gf87.length;

                // ---- 更新显示 ----
                err85Display.textContent = err85.map(v => v.toFixed(2) + '%').join('  ');
                err87Display.textContent = err87.map(v => v.toFixed(2) + '%').join('  ');
                mean85Display.innerHTML = mean85.toFixed(6) + ' <small>± ' + U85.toFixed(6) + '</small>';
                mean87Display.innerHTML = mean87.toFixed(6) + ' <small>± ' + U87.toFixed(6) + '</small>';
                stdDisplay.textContent = 'Rb₈₅ = ' + std85.toFixed(6) + '  |  Rb₈₇ = ' + std87.toFixed(4);

                // ---- 更新折线图 ----
                if (lineChart) {
                    lineChart.data.datasets[0].data = err85;
                    lineChart.data.datasets[1].data = err87;
                    lineChart.update();
                } else {
                    // 首次创建
                    const ctxLine = document.getElementById('lineChart').getContext('2d');
                    lineChart = new Chart(ctxLine, {
                        type: 'line',
                        data: {
                            labels: n.map(v => '#' + v),
                            datasets: [{
                                label: 'Rb₈₅ g_F',
                                data: err85,
                                borderColor: '#1f77b4',
                                backgroundColor: 'rgba(31,119,180,0.08)',
                                pointBackgroundColor: '#1f77b4',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 1.5,
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                tension: 0.15,
                                fill: false,
                                borderWidth: 2.5,
                            }, {
                                label: 'Rb₈₇ g_F',
                                data: err87,
                                borderColor: '#d62728',
                                backgroundColor: 'rgba(214,39,40,0.08)',
                                pointBackgroundColor: '#d62728',
                                pointBorderColor: '#fff',
                                pointBorderWidth: 1.5,
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                tension: 0.15,
                                fill: false,
                                borderWidth: 2.5,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: { font: { size: 10, weight: '500' }, boxWidth: 12, padding: 12 }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return context.dataset.label + ': ' + context.parsed.y.toFixed(2) +
                                            '%';
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    title: { display: true, text: '相对误差 Eᵣ (%)', font: { size: 10,
                                            weight: '500' } },
                                    grid: { color: 'rgba(0,0,0,0.04)' },
                                    beginAtZero: true,
                                },
                                x: {
                                    title: { display: true, text: '测量次数', font: { size: 10,
                                        weight: '500' } },
                                    grid: { display: false }
                                }
                            },
                            elements: { line: { borderJoinStyle: 'round' } }
                        },
                        plugins: [{
                            id: 'customLabels',
                            afterDraw: function(chart) {
                                const ctx = chart.ctx;
                                chart.data.datasets.forEach((dataset, i) => {
                                    const meta = chart.getDatasetMeta(i);
                                    const data = dataset.data;
                                    const color = dataset.borderColor;
                                    meta.data.forEach((element, index) => {
                                        const value = data[index];
                                        const x = element.x;
                                        const y = element.y - 10;
                                        ctx.save();
                                        ctx.font = '8px "JetBrains Mono", monospace';
                                        ctx.textAlign = 'center';
                                        ctx.textBaseline = 'bottom';
                                        ctx.fillStyle = color;
                                        ctx.fillText(value.toFixed(2) + '%', x, y);
                                        ctx.restore();
                                    });
                                });
                            }
                        }]
                    });
                }

                // ---- 更新柱状图 ----
                if (barChart) {
                    barChart.data.datasets[0].data = [mean85, mean87];
                    barChart.update();
                } else {
                    const ctxBar = document.getElementById('barChart').getContext('2d');
                    barChart = new Chart(ctxBar, {
                        type: 'bar',
                        data: {
                            labels: ['Rb₈₅ g_F', 'Rb₈₇ g_F'],
                            datasets: [{
                                label: '测量平均值',
                                data: [mean85, mean87],
                                backgroundColor: ['rgba(49, 130, 189, 0.85)', 'rgba(49, 130, 189, 0.85)'],
                                borderColor: ['#2a6b96', '#2a6b96'],
                                borderWidth: 1.5,
                                borderRadius: 6,
                                barPercentage: 0.55,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return '平均值: ' + context.parsed.y.toFixed(6);
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    title: { display: true, text: 'g_F 因子平均值', font: { size: 10,
                                            weight: '500' } },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    min: 0.30,
                                    max: 0.55,
                                },
                                x: {
                                    grid: { display: false }
                                }
                            }
                        },
                        plugins: [{
                            id: 'errorbarsAndLabels',
                            afterDraw: function(chart) {
                                const ctx = chart.ctx;
                                const meta = chart.getDatasetMeta(0);
                                const data = chart.data.datasets[0].data;
                                const uncs = [U85, U87];
                                meta.data.forEach((element, index) => {
                                    const x = element.x;
                                    const y = element.y;
                                    const value = data[index];
                                    const unc = uncs[index] || 0;
                                    const topY = chart.scales.y.getPixelForValue(value + unc);
                                    const bottomY = chart.scales.y.getPixelForValue(value - unc);
                                    ctx.save();
                                    ctx.strokeStyle = '#1a1a2e';
                                    ctx.lineWidth = 1.8;
                                    ctx.beginPath();
                                    ctx.moveTo(x, topY);
                                    ctx.lineTo(x, bottomY);
                                    ctx.stroke();
                                    const capSize = 5;
                                    ctx.beginPath();
                                    ctx.moveTo(x - capSize, topY);
                                    ctx.lineTo(x + capSize, topY);
                                    ctx.moveTo(x - capSize, bottomY);
                                    ctx.lineTo(x + capSize, bottomY);
                                    ctx.stroke();
                                    ctx.restore();
                                    const label = value.toFixed(6) + ' ± ' + unc.toFixed(6);
                                    ctx.save();
                                    ctx.font = '8px "JetBrains Mono", monospace';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'bottom';
                                    ctx.fillStyle = '#0b2a44';
                                    ctx.fillText(label, x, topY - 8);
                                    ctx.restore();
                                });
                            }
                        }]
                    });
                }
            }

            // ---- 预设数据 ----
            const presets = {
                default: {
                    data85: '0.331111, 0.330705, 0.331258, 0.331074, 0.330521',
                    data87: '0.496426, 0.495504, 0.496795, 0.496057, 0.495873',
                    std85: '0.333333333333333',
                    std87: '0.5',
                    u85: '0.012700477',
                    u87: '0.01270125'
                },
                sample1: {
                    data85: '0.3290, 0.3285, 0.3301, 0.3278, 0.3295',
                    data87: '0.4930, 0.4922, 0.4945, 0.4918, 0.4937',
                    std85: '0.333333333333333',
                    std87: '0.5',
                    u85: '0.0150',
                    u87: '0.0148'
                },
                sample2: {
                    data85: '0.3329, 0.3331, 0.3330, 0.3328, 0.3332',
                    data87: '0.4995, 0.4998, 0.4996, 0.4997, 0.4999',
                    std85: '0.333333333333333',
                    std87: '0.5',
                    u85: '0.0025',
                    u87: '0.0023'
                }
            };

            function loadPreset(name) {
                const p = presets[name];
                if (!p) return;
                data85Input.value = p.data85;
                data87Input.value = p.data87;
                std85Input.value = p.std85;
                std87Input.value = p.std87;
                u85Input.value = p.u85;
                u87Input.value = p.u87;
                updateCharts();
            }

            // ---- 事件绑定 ----
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    loadPreset(this.dataset.preset);
                });
            });

            updateBtn.addEventListener('click', updateCharts);

            resetBtn.addEventListener('click', function() {
                loadPreset('default');
            });

            // ---- 下载截图 (使用 html2canvas 轻量) ----
            downloadBtn.addEventListener('click', function() {
                // 简单下载：直接截取整个 container
                const container = document.querySelector('.container');
                // 使用 html2canvas CDN
                if (typeof html2canvas === 'undefined') {
                    // 动态加载 html2canvas
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                    script.onload = function() {
                        doDownload(container);
                    };
                    document.head.appendChild(script);
                } else {
                    doDownload(container);
                }
            });

            function doDownload(element) {
                html2canvas(element, {
                    scale: 1.8,
                    backgroundColor: '#ffffff',
                    allowTaint: false,
                    useCORS: true,
                    logging: false,
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'gF_analysis.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    alert('截图生成失败，请重试或手动截图。');
                    console.warn(err);
                });
            }

            // ---- 自动初始化 ----
            window.addEventListener('load', function() {
                // 确保默认数据加载
                updateCharts();
            });

            // 键盘快捷操作: Ctrl+Enter 更新
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    updateCharts();
                }
            });

            // 暴露给全局
            window.updateCharts = updateCharts;

        })();
    </script>

</body>
</html>
